<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
2026 AM Product Catalog | Gypsophila
</title>


<meta name="description"
content="Gypsophila premium beauty products catalog with direct Amazon purchase links.">


<link rel="icon" href="images/favicon.png">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">


<link rel="stylesheet" href="style.css">


</head>



<body>



<div class="page-loader">

<div class="loader-logo">
Gypsophila
</div>

</div>





<header class="header">


<div class="logo">

Gypsophila

</div>





<div class="header-actions">



<!-- Language -->

<select 
id="language"
class="language-select">


<option value="es">
Español
</option>


<option value="en">
English
</option>


<option value="ar">
العربية
</option>


</select>





<!-- Theme -->


<button class="theme-toggle"
id="themeToggle"
aria-label="Change Theme">


<span class="sun">
☀
</span>


<span class="moon">
◐
</span>


</button>




</div>


</header>







<section class="hero">



<div class="hero-content">



<span class="hero-tag"
data-lang="heroTag">

</span>





<h1
data-lang="heroTitle">

</h1>






<p
data-lang="heroDesc">

</p>






<button class="hero-button"
onclick="scrollToProducts()"
data-lang="explore">


</button>




</div>





<div class="hero-circle circle-one"></div>

<div class="hero-circle circle-two"></div>



</section>









<section class="products-section"
id="products">



<div class="section-header">



<span data-lang="featured">

</span>





<h2 data-lang="collection">

</h2>





<p>



<span data-lang="showing">

</span>


<strong id="productCount">
0
</strong>


<span data-lang="products">

</span>


</p>



</div>







<div class="products-grid"
id="productsGrid">


</div>




</section>









<div class="image-modal"
id="imageModal">


<div class="modal-overlay"></div>



<button class="modal-close"
id="modalClose">

×

</button>




<img id="modalImage"
src=""
alt="Product Preview">



</div>









<div class="toast"
id="toast">


<span>
✓
</span>


<p data-lang="copied">

</p>


</div>








<button class="back-top"
id="backTop">

↑

</button>









<footer class="footer">


<div class="footer-logo">

Gypsophila

</div>





<p data-lang="footer">

</p>





<span>

© 2026 Gypsophila.
All Rights Reserved.

</span>




</footer>







<script src="script.js"></script>


</body>


</html>
